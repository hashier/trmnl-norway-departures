name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install -r src/cloud-function/requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/
        env:
          PYTHONPATH: src/cloud-function
